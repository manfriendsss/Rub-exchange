<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
    <title>Đổi tiền</title>
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Đổi tiền" />
    <link rel="icon" type="image/webp" href="/app_icon.webp" />
    <link rel="apple-touch-icon" href="/app_icon.webp" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Đổi tiền" />
    <!-- Splash Screen for iPhone -->
    <link rel="apple-touch-startup-image" href="/app_icon.webp" />
    <link rel="manifest" href="/manifest.json" />
    <style>
      #splash-screen {
        position: fixed;
        inset: 0;
        background-color: #0f172a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
      }
      .splash-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }
      .splash-logo-container {
        width: 120px;
        height: 120px;
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        padding: 4px;
        border-radius: 9999px; /* Force circular */
        box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(16,185,129,0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        animation: splash-pulse 2s infinite ease-in-out;
      }
      .splash-logo-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 9999px; /* Force circular on image too */
      }
      .splash-text {
        color: #ffffff;
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 900;
        letter-spacing: 0.3em;
        font-size: 14px;
        opacity: 0.6;
        text-transform: uppercase;
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      body.app-loaded #splash-screen {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
    </style>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed: ', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="splash-screen">
      <div class="splash-content">
        <div class="splash-logo-container">
          <img src="/app_icon.webp" alt="Rub Exchange" />
        </div>
        <div class="splash-text">Đang tải...</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
